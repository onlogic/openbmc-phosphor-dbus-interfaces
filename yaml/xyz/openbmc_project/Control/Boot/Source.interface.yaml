description: >
    Implement to designate the source of a boot image.

properties:
    - name: BootSource
      type: enum[self.Sources]
      description: >
          The desired boot image source.

enumerations:
    - name: Sources
      description: >
          Possible sources of a boot image.
      values:
          - name: Default
            description: >
                Boot current default source, equivalent to IPMI's No Override source.
          - name: Disk
            description: >
                Boot from the local hard disk.
          - name: RemovableMedia
            description: >
                Boot from an external media source, equivalent to IPMI's Floppy/primary removable media source.
          - name: VirtualMedia
            description: >
                Boot from a virtual media source, equivalent to IPMI's remotely connected Floppy/primary removable media source.
          - name: Network
            description: >
                Boot from a remote source over a network.
